version: '3.8'

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - gateway-network
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGODB_URI=mongodb://mongo:27017/payment_gateway
      - CORS_ORIGIN=http://localhost
      - JWT_SECRET=${JWT_SECRET:-quantum-gateway-secret-key}
    depends_on:
      - mongo
    networks:
      - gateway-network
    restart: unless-stopped

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
      - ./database/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    networks:
      - gateway-network
    restart: unless-stopped

volumes:
  mongo-data:
    driver: local

networks:
  gateway-network:
    driver: bridge
