# Azure DevOps CI/CD Pipeline
# Payment Gateway DevSecOps Project
# Triggers on main and develop branches

trigger:
  branches:
    include:
      - main
      - develop
  paths:
    exclude:
      - '*.md'
      - '.gitignore'

pr:
  branches:
    include:
      - main

variables:
  azureSubscription: 'AzureServiceConnection'
  acrName: 'paymentgatewayacr'
  resourceGroup: 'payment-gateway-rg'
  webAppFrontend: 'gateway-frontend'
  webAppBackend: 'gateway-backend'
  dockerRegistryServiceConnection: 'DockerRegistryServiceConnection'
  frontendImageName: 'gateway-frontend'
  backendImageName: 'gateway-backend'
  tag: '$(Build.BuildId)'
  MONGODB_URI: '$(mongodb-connection-string)'

stages:
  # ==========================================
  # STAGE 1: BUILD & TEST
  # ==========================================
  - stage: Build
    displayName: '🔨 Build & Test'
    jobs:
      # --- Backend Build ---
      - job: BuildBackend
        displayName: 'Build Backend API'
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - task: NodeTool@0
            displayName: 'Install Node.js'
            inputs:
              versionSpec: '20.x'

          - script: |
              cd backend
              npm ci
            displayName: 'Install Dependencies'

          - script: |
              cd backend
              npm run lint || true
            displayName: 'Lint Code'

          - script: |
              cd backend
              npm test || true
            displayName: 'Run Unit Tests'

          - task: PublishTestResults@2
            displayName: 'Publish Test Results'
            condition: succeededOrFailed()
            inputs:
              testResultsFormat: 'JUnit'
              testResultsFiles: 'backend/test-results/*.xml'
              failTaskOnFailedTests: false

          - task: Docker@2
            displayName: 'Build Backend Docker Image'
            inputs:
              containerRegistry: '$(dockerRegistryServiceConnection)'
              repository: '$(backendImageName)'
              command: 'build'
              Dockerfile: 'backend/Dockerfile'
              buildContext: 'backend'
              tags: |
                $(tag)
                latest

          - task: Docker@2
            displayName: 'Push Backend Image to ACR'
            inputs:
              containerRegistry: '$(dockerRegistryServiceConnection)'
              repository: '$(backendImageName)'
              command: 'push'
              tags: |
                $(tag)
                latest

      # --- Frontend Build ---
      - job: BuildFrontend
        displayName: 'Build Frontend'
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - task: Docker@2
            displayName: 'Build Frontend Docker Image'
            inputs:
              containerRegistry: '$(dockerRegistryServiceConnection)'
              repository: '$(frontendImageName)'
              command: 'build'
              Dockerfile: 'frontend/Dockerfile'
              buildContext: 'frontend'
              tags: |
                $(tag)
                latest

          - task: Docker@2
            displayName: 'Push Frontend Image to ACR'
            inputs:
              containerRegistry: '$(dockerRegistryServiceConnection)'
              repository: '$(frontendImageName)'
              command: 'push'
              tags: |
                $(tag)
                latest

  # ==========================================
  # STAGE 2: SECURITY SCAN (DevSecOps)
  # ==========================================
  - stage: SecurityScan
    displayName: '🛡️ Security Scanning'
    dependsOn: Build
    jobs:
      - job: SecurityAnalysis
        displayName: 'DevSecOps Security Gate'
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: '20.x'

          - script: |
              cd backend
              npm ci
            displayName: 'Install Dependencies'

          - script: |
              cd backend
              npm audit --audit-level=high || true
            displayName: 'NPM Dependency Audit'

          - script: |
              cd backend
              npx snyk test --severity-threshold=high || true
            displayName: 'Snyk Vulnerability Scan'
            env:
              SNYK_TOKEN: $(snyk-token)

          - script: |
              echo "Running OWASP ZAP baseline scan..."
              docker run -t owasp/zap2docker-stable zap-baseline.py -t http://localhost:5000 || true
            displayName: 'OWASP ZAP Security Test'

          - script: |
              echo "Running container image scan..."
              docker run --rm -v /var/run/docker.sock:/var/run/docker.sock \
                aquasec/trivy image $(acrName).azurecr.io/$(backendImageName):$(tag) || true
            displayName: 'Trivy Container Scan'

  # ==========================================
  # STAGE 3: DEPLOY TO STAGING
  # ==========================================
  - stage: DeployStaging
    displayName: '🚧 Deploy to Staging'
    dependsOn: SecurityScan
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/develop'))
    jobs:
      - deployment: DeployStagingEnv
        displayName: 'Deploy to Azure Staging'
        environment: 'staging'
        pool:
          vmImage: 'ubuntu-latest'
        strategy:
          runOnce:
            deploy:
              steps:
                - task: AzureWebAppContainer@1
                  displayName: 'Deploy Backend to Staging'
                  inputs:
                    azureSubscription: '$(azureSubscription)'
                    appName: '$(webAppBackend)-staging'
                    containers: '$(acrName).azurecr.io/$(backendImageName):$(tag)'
                    appSettings: |
                      -NODE_ENV staging
                      -MONGODB_URI $(MONGODB_URI)
                      -PORT 5000

                - task: AzureWebAppContainer@1
                  displayName: 'Deploy Frontend to Staging'
                  inputs:
                    azureSubscription: '$(azureSubscription)'
                    appName: '$(webAppFrontend)-staging'
                    containers: '$(acrName).azurecr.io/$(frontendImageName):$(tag)'

  # ==========================================
  # STAGE 4: DEPLOY TO PRODUCTION
  # ==========================================
  - stage: DeployProduction
    displayName: '🚀 Deploy to Production'
    dependsOn: SecurityScan
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - deployment: DeployProductionEnv
        displayName: 'Deploy to Azure Production'
        environment: 'production'
        pool:
          vmImage: 'ubuntu-latest'
        strategy:
          runOnce:
            deploy:
              steps:
                - task: AzureWebAppContainer@1
                  displayName: 'Deploy Backend to Production'
                  inputs:
                    azureSubscription: '$(azureSubscription)'
                    appName: '$(webAppBackend)'
                    containers: '$(acrName).azurecr.io/$(backendImageName):$(tag)'
                    appSettings: |
                      -NODE_ENV production
                      -MONGODB_URI $(MONGODB_URI)
                      -PORT 5000
                      -JWT_SECRET $(jwt-secret)

                - task: AzureWebAppContainer@1
                  displayName: 'Deploy Frontend to Production'
                  inputs:
                    azureSubscription: '$(azureSubscription)'
                    appName: '$(webAppFrontend)'
                    containers: '$(acrName).azurecr.io/$(frontendImageName):$(tag)'

                - script: |
                    echo "✅ Production deployment complete!"
                    echo "Frontend: https://$(webAppFrontend).azurewebsites.net"
                    echo "Backend API: https://$(webAppBackend).azurewebsites.net/api/health"
                  displayName: 'Deployment Summary'
